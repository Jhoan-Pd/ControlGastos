# =========================================================
# Perfil de producción (Render)
# Activar con: SPRING_PROFILES_ACTIVE=prod
# =========================================================

server.port=${PORT:8080}

# Base de datos — Render inyecta las variables DB_* desde render.yaml
# Se construye la URL JDBC para evitar el problema de formato con connectionString de Render
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Serialización de fechas
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# CORS — orígenes permitidos (separados por coma, sin espacios)
cors.origins=${CORS_ORIGINS:http://localhost:3001}

# Logging reducido en producción
logging.level.root=WARN
logging.level.com.finanzas=INFO
logging.level.org.hibernate.SQL=WARN
