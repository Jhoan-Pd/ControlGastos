# Configuración local de desarrollo
# En producción (Render), se usa application-prod.properties activado por SPRING_PROFILES_ACTIVE=prod

server.port=8080

# Base de datos local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/controlgastos
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Serialización de fechas
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# CORS local
cors.origins=http://localhost:3001,http://localhost:5173
